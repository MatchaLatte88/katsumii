<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katsumii</title>
  <link rel="stylesheet" href="./fonts/fonts.css" />
  <!-- Block render until theme is resolved — prevents flash of wrong background -->
  <style>
    html { background: #f8fafc; }
    html.dark-init { background: #020617; }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem('katsumii-theme');
      if (!t) {
        var h = new Date().getHours();
        t = (h >= 6 && h < 19) ? 'light' : 'dark';
      }
      if (t === 'dark') document.documentElement.classList.add('dark-init');
    })();
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e5a8e4a5-cf96-4053-8fa4-9245f4fe5af4"></script>
  <script type="module" src="/src/main.js"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
